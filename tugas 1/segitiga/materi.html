<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar Luas Segitiga - Bisa Matematika</title>
    <style>
        :root {
            --primary: #2e7d32;
            --secondary: #e8f5e9;
            --text: #333;
            --accent: #1b5e20;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f4f0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .main-card {
            background: white;
            width: 100%;
            max-width: 700px; /* Diperlebar sedikit biar muat gallery */
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 25px;
        }

        .header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; color: var(--primary); }

        /* Area Visualisasi Segitiga */
        .visual-box {
            background: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 8px;
            height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        /* Blok Rumus */
        .formula-box {
            background: #dbffc4;
            border: 1px solid #2dfb6b;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
            text-align: center;
        }

        .formula-main { font-size: 1.5rem; font-weight: bold; margin-bottom: 5px; }
        .formula-desc { font-size: 0.85rem; color: #555; }

        /* --- BAGIAN BARU: Gallery & Contoh Soal --- */
        .bottom-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
            border-top: 2px dashed #eee;
            padding-top: 25px;
        }

        /* Horizontal Scroll Gallery */
        .scroll-wrapper {
            width: 100%;
        }
        
        .scroll-wrapper h4 { margin: 0 0 10px 0; font-size: 0.9rem; color: var(--primary); }

        .image-gallery {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: thin; /* Untuk Firefox */
            scrollbar-color: var(--primary) #eee;
        }

        /* Styling Scrollbar buat Chrome/Edge */
        .image-gallery::-webkit-scrollbar { height: 6px; }
        .image-gallery::-webkit-scrollbar-track { background: #eee; border-radius: 10px; }
        .image-gallery::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .gallery-item {
            min-width: 150px;
            height: 100px;
            background: #eee;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid #ddd;
        }

        /* Contoh Soal */
        .example-box {
            background: #fafafa;
            border-radius: 8px;
            padding: 15px;
            border-left: 4px solid var(--primary);
        }

        .example-box h4 { margin: 0 0 10px 0; font-size: 0.9rem; color: var(--primary); }
        .example-text { font-size: 0.85rem; line-height: 1.4; margin-bottom: 10px; }
        .solution {
            background: white;
            padding: 10px;
            border-radius: 5px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.8rem;
            color: #1b5e20;
            border: 1px solid #c8e6c9;
        }

        /* Responsif buat HP */
        @media (max-width: 600px) {
            .bottom-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header">
        <span>▲</span> <strong>Materi: Luas Segitiga</strong>
    </div>

    <div class="visual-box">
        <svg width="120" height="100" viewBox="0 0 150 120">
            <polygon points="75,20 20,100 130,100" fill="none" stroke="#2e7d32" stroke-width="2" />
            <line x1="75" y1="20" x2="75" y2="100" stroke="#f44336" stroke-dasharray="4" />
            <text x="80" y="65" fill="#f44336" font-size="12">t</text>
            <text x="70" y="115" fill="#2e7d32" font-size="12">a</text>
        </svg>
        <p style="font-size: 0.7rem; color: #888; margin-top: 10px;">Visualisasi Komponen Segitiga</p>
    </div>

    <div class="formula-box">
        <div class="formula-main">L = ½ × a × t</div>
        <div class="formula-desc">Luas = Setengah × Alas × Tinggi</div>
    </div>

    <div class="bottom-grid">
        
        <div class="scroll-wrapper">
            <h4>Galeri Visual</h4>
            <div class="image-gallery">
                <img src="segitigabiasa.jpg" alt="Contoh 1" class="gallery-item">
                <img src="segitigaket.jpg" alt="Contoh 2" class="gallery-item">

            </div>
        </div>

        <div class="example-box">
            <h4> Contoh Soal</h4>
            <div class="example-text">
                Sebuah segitiga memiliki alas <strong>10 cm</strong> dan tinggi <strong>8 cm</strong>. Berapakah luasnya?
            </div>
            <div class="solution">
                Diketahui:<br>
                a = 10, t = 8<br><br>
                L = ½ × a × t<br>
                L = ½ × 10 × 8<br>
                L = 5 × 8<br>
                <strong>L = 40 cm²</strong>
            </div>
        </div>

    </div>
</div>

</body>
</html>
