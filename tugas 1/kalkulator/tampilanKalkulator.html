<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas IMK - Kalkulator Matematika - 12409011030055</title>
    <style>
        /* CSS: Styling Modern & Clean (Fokus Psikologi Kognitif) */
        :root {
            --primary-color: #2e7d32;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        h1 { margin-bottom: 5px; color: #1b5e20; }
        .subtitle { margin-bottom: 30px; color: #666; font-size: 0.95em; text-align: center; }

        .container {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 900px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            width: 340px;
            padding: 30px;
            transition: transform 0.3s ease;
            border: 1px solid #eee;
        }

        .card:hover { transform: translateY(-5px); }

        /* Container Gambar Lokal */
        .shape-img {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .shape-img img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        h2 {
            text-align: center;
            font-size: 1.4em;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .input-group { margin-bottom: 15px; }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9em;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus { border-color: var(--primary-color); }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            margin-top: 10px;
            transition: background 0.3s;
        }

        button:hover { background-color: #1b5e20; }

        /* Box Hasil & Langkah-langkah */
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #f1f8e9;
            border-left: 5px solid var(--primary-color);
            border-radius: 8px;
            display: none; /* Sembunyi sebelum dihitung */
            animation: fadeIn 0.4s ease-in-out;
        }

        .step-title { font-weight: bold; color: #333; margin-bottom: 8px; display: block; }
        .step-detail { font-size: 0.85em; color: #555; margin: 4px 0; }
        .final-val {
            font-size: 1.2em;
            font-weight: bold;
            color: var(--primary-color);
            margin-top: 10px;
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <h1>Kalkulator Matematika</h1>
    <p class="subtitle">Prinsip Kognitif: Bantuan Visual & Pemrosesan Informasi Bertahap</p>

    <div class="container">
        
        <div class="card">
            <div class="shape-img">
                <img src="lingkaranbiasa.png" alt="Gambar Lingkaran">
            </div>
            <h2>Luas Lingkaran</h2>
            <div class="input-group">
                <label>Jari-jari (r):</label>
                <input type="number" id="jariInput" placeholder="Masukkan nilai r...">
            </div>
            <button onclick="hitungLingkaran()">Hitung Luas</button>

            <div id="resL" class="result-box">
                <span class="step-title">💡 Cara Menghitung:</span>
                <p class="step-detail">1. Rumus: π × r²</p>
                <p id="detailL" class="step-detail"></p>
                <span id="hasilL" class="final-val"></span>
            </div>
        </div>

        <div class="card">
            <div class="shape-img">
                <img src="segitigabiasa.jpg" alt="Gambar Segitiga">
            </div>
            <h2>Luas Segitiga</h2>
            <div class="input-group">
                <label>Alas (a):</label>
                <input type="number" id="alasInput" placeholder="Masukkan nilai alas...">
            </div>
            <div class="input-group">
                <label>Tinggi (t):</label>
                <input type="number" id="tinggiInput" placeholder="Masukkan nilai tinggi...">
            </div>
            <button onclick="hitungSegitiga()">Hitung Luas</button>

            <div id="resS" class="result-box">
                <span class="step-title">💡 Cara Menghitung:</span>
                <p class="step-detail">1. Rumus: ½ × a × t</p>
                <p id="detailS" class="step-detail"></p>
                <span id="hasilS" class="final-val"></span>
            </div>
        </div>

    </div>

    <script>
        function hitungLingkaran() {
            const r = document.getElementById('jariInput').value;
            if (r > 0) {
                const luas = (Math.PI * r * r).toFixed(2);
                document.getElementById('detailL').innerText = `2. Hitung: 3.14 × ${r} × ${r}`;
                document.getElementById('hasilL').innerText = `Luas = ${luas}`;
                document.getElementById('resL').style.display = 'block';
            } else {
                alert("Tolong masukkan angka jari-jari yang valid!");
            }
        }

        function hitungSegitiga() {
            const a = document.getElementById('alasInput').value;
            const t = document.getElementById('tinggiInput').value;
            if (a > 0 && t > 0) {
                const luas = (0.5 * a * t).toFixed(2);
                document.getElementById('detailS').innerText = `2. Hitung: 0.5 × ${a} × ${t}`;
                document.getElementById('hasilS').innerText = `Luas = ${luas}`;
                document.getElementById('resS').style.display = 'block';
            } else {
                alert("Tolong masukkan alas dan tinggi yang valid!");
            }
        }
    </script>

</body>
</html>
